<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础查询库 | ROCO</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        .query-container {
            width: 100%;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            background: rgba(10, 10, 10, 0.5);
            overflow: hidden;
        }
        .query-header {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .query-header select, .query-header input, .query-header button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
        }
        .query-header button {
            cursor: pointer;
            background: #d000ff;
            font-weight: bold;
        }
        .query-header button:hover {
            background: #e24dfc;
        }
        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            text-align: left;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        td {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: help;
        }
        th {
            background: rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
        }
        tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="query-container">
        <a href="index.html" class="back-btn">返回战术大脑 ➔</a>
        <h2 style="color: #fff; margin:0;" class="logo-text">基础数据查询</h2>
        
        <div class="query-header">
            <select id="queryType">
                <option value="pets">查询精灵 (Pets)</option>
                <option value="skills">查询技能 (Skills)</option>
                <option value="natures">查询性格 (Natures)</option>
            </select>
            <input type="text" id="keyword" placeholder="输入关键词...">
            <button onclick="doQuery()">搜索</button>
        </div>

        <div class="table-wrapper">
            <table id="resultTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'http://159.65.135.84:8081/api/v1/data';

        async function doQuery() {
            const type = document.getElementById('queryType').value;
            const keyword = document.getElementById('keyword').value;
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">加载中...</td></tr>';
            
            try {
                const res = await fetch(`${API_BASE}/${type}?keyword=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">暂无数据</td></tr>';
                    return;
                }

                thead.innerHTML = '';
                tbody.innerHTML = '';

                // Generate table headers based on first object
                const keys = Object.keys(data[0]);
                let headTr = document.createElement('tr');
                keys.forEach(k => {
                    let th = document.createElement('th');
                    th.innerText = k;
                    headTr.appendChild(th);
                });
                thead.appendChild(headTr);

                // Generate rows
                data.forEach(item => {
                    let tr = document.createElement('tr');
                    keys.forEach(k => {
                        let td = document.createElement('td');
                        let val = item[k];
                        let displayText = "";
                        if (typeof val === 'object' && val !== null) {
                            displayText = JSON.stringify(val);
                        } else {
                            displayText = val !== null ? String(val) : '';
                        }
                        td.innerText = displayText;
                        td.title = displayText; // Hover to see full text
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; color: #ff4d4f;">查询失败，请检查网络或后端服务</td></tr>';
            }
        }

        // Auto-load on open
        doQuery();
    </script>
</body>
</html>
