<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精灵战术评述管理后台 - ROCO</title>
    <link rel="stylesheet" href="encyclopedia.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            color: white;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .progress-card {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: none;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #d946ef);
            width: 0%;
            transition: width 0.3s;
        }

        .pet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .pet-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s;
            position: relative;
        }

        .pet-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-4px);
        }

        .pet-card.has-review {
            border-color: rgba(139, 92, 246, 0.3);
        }

        .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .pet-name {
            font-size: 20px;
            font-weight: 700;
            font-family: 'Outfit';
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .status-ready { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

        .stats-summary {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 11px;
            color: #94a3b8;
        }

        .stats-summary span {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 6px;
        }

        .review-content {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
        }

        .review-content:hover {
            background: rgba(139, 92, 246, 0.1);
            color: white;
            -webkit-line-clamp: unset;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            outline: none;
            width: 250px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="font-family: 'Outfit'; margin: 0;">精灵战术评述管理</h1>
                <p style="color: #64748b; margin: 4px 0 0 0;">锁定 248 只最终形态进行 GPT-5.4 深度分析</p>
            </div>
            <div class="btn-group">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索精灵名称...">
                <button id="syncBatchBtn" class="btn btn-primary">
                    <i class="fas fa-bolt"></i> 一键同步全网评述
                </button>
            </div>
        </div>

        <div id="progressCard" class="progress-card">
            <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px;">
                <span><i class="fas fa-robot"></i> AI 专家正在生成战术评述...</span>
                <span id="progressText">0 / 0 (0%)</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>

        <div id="petGrid" class="pet-grid">
            <!-- Pets injected here -->
        </div>
    </div>

    <script>
        const API_BASE = `http://${window.location.hostname || 'localhost'}:8081/api/v1/data`;
        let pets = [];
        let statusInterval = null;

        async function loadPets() {
            try {
                const resp = await fetch(`${API_BASE}/pets/review-candidates`);
                pets = await resp.json();
                renderGrid(pets);
            } catch (e) {
                alert('加载失败');
            }
        }

        function renderGrid(data) {
            const grid = document.getElementById('petGrid');
            grid.innerHTML = data.map(p => `
                <div class="pet-card ${p.review_content ? 'has-review' : ''}">
                    <div class="pet-header">
                        <div class="pet-name">${p.name} <span style="font-size: 11px; opacity: 0.5;">#${p.id}</span></div>
                        <span class="status-badge ${p.review_content ? 'status-ready' : 'status-pending'}">
                            ${p.review_content ? '已生成' : '待处理'}
                        </span>
                    </div>
                    <div class="stats-summary">
                        <span>HP:${p.hp}</span>
                        <span>ATK:${p.attack}</span>
                        <span>MATK:${p.magic_attack}</span>
                        <span>SPD:${p.speed}</span>
                    </div>
                    ${p.review_content ? `<div class="review-content">${p.review_content}</div>` : 
                    '<div class="review-content" style="color:#64748b; text-align:center; padding: 20px;">暂无评述</div>'}
                    <div class="card-actions">
                        <button class="btn btn-secondary btn-sm" onclick="syncSingle(${p.id})">
                            <i class="fas fa-redo"></i> ${p.review_content ? '重新生成' : '立即生成'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function syncSingle(id) {
            const btn = event.currentTarget;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';
            
            try {
                const resp = await fetch(`${API_BASE}/pets/${id}/ai-review`, { method: 'POST' });
                const data = await resp.json();
                if (data.success) {
                    loadPets();
                } else {
                    alert('生成失败');
                }
            } catch (e) {
                alert('网络错误');
            }
        }

        async function syncBatch() {
            if (!confirm('确定启动全量 248 条精灵评述生成吗？')) return;
            
            try {
                const resp = await fetch(`${API_BASE}/pets/ai-sync-reviews`, { method: 'POST' });
                const data = await resp.json();
                if (data.success) {
                    checkStatus();
                }
            } catch (e) {
                alert('同步启动失败');
            }
        }

        async function checkStatus() {
            try {
                const resp = await fetch(`${API_BASE}/pets/ai-sync-reviews-status`);
                const data = await resp.json();
                
                const card = document.getElementById('progressCard');
                const fill = document.getElementById('progressFill');
                const text = document.getElementById('progressText');

                if (data.running) {
                    card.style.display = 'block';
                    fill.style.width = `${data.percent}%`;
                    text.innerText = `${data.processed} / ${data.total} (${data.percent.toFixed(1)}%)`;
                    if (!statusInterval) statusInterval = setInterval(checkStatus, 2000);
                } else {
                    if (statusInterval) {
                        clearInterval(statusInterval);
                        statusInterval = null;
                        card.style.display = 'none';
                        loadPets(); // 结束后刷新列表
                    }
                }
            } catch (e) {}
        }

        document.getElementById('syncBatchBtn').onclick = syncBatch;
        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = pets.filter(p => p.name.toLowerCase().includes(val));
            renderGrid(filtered);
        };

        loadPets();
        checkStatus(); // 初始检查
    </script>
</body>
</html>
