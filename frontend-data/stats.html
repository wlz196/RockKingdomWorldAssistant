<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCO 技能打标大数据仪表盘</title>
    <link rel="stylesheet" href="encyclopedia.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            padding: 40px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Outfit';
            margin: 8px 0;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 40px;
        }

        .tag-list-panel {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tag-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .tag-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .tag-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .tag-name {
            font-weight: 500;
        }

        .tag-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .details-panel {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .skill-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .skill-card-tiny {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .skill-card-tiny h4 {
            margin: 0 0 8px 0;
            color: #fff;
        }

        .skill-card-tiny p {
            margin: 0;
            font-size: 12px;
            color: #94a3b8;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-4px);
        }

        .btn-ai-sync {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-ai-sync:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }

        .btn-ai-sync:active {
            transform: translateY(0);
        }

        .btn-ai-sync:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 进度条样式 */
        .progress-panel {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 30px;
            display: none;
            backdrop-filter: blur(10px);
        }

        .progress-bar-bg {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
            margin: 12px 0;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #d946ef);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #c4b5fd;
            font-family: 'Outfit';
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">
        <div class="stat-value">分析中...</div>
    </div>

    <div class="dashboard text-white">
        <div class="header">
            <div>
                <h1 style="font-family: 'Outfit'; font-size: 32px; margin:0;">全息打标数据大盘</h1>
                <p style="color: #64748b; margin: 4px 0 0 0;">Skill Tactical Insights & Distribution</p>
            </div>
            <div style="display: flex; gap: 12px;">
                <button id="aiSyncBtn" class="btn-ai-sync">
                    <i class="fas fa-bolt"></i> 一键 AI 极速打标
                </button>
                <a href="tagger.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> 返回打标台
                </a>
            </div>
        </div>

        <!-- 进度条面板 -->
        <div id="progressPanel" class="progress-panel">
            <div class="progress-info">
                <span><i class="fas fa-robot"></i> AI 语义打标同步中...</span>
                <span id="progressText">0 / 0 (0%)</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
            <div style="font-size: 12px; color: #64748b;">后台正在利用 GPT-5.4 并行处理战术语义，请勿频繁刷新。</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总技能数</div>
                <div id="totalSkills" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">已覆盖技能</div>
                <div id="taggedSkills" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">打标覆盖率</div>
                <div id="coverage" class="stat-value">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">战术维度数</div>
                <div id="totalTags" class="stat-value">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="tag-list-panel">
                <h3 style="margin-top:0;">战术频次分布</h3>
                <div id="tagList" style="margin-top:20px;">
                    <!-- Tags will be injected here -->
                </div>
            </div>
            <div class="details-panel">
                <h3 id="detailTitle">选择标签查看详情</h3>
                <div id="skillList" class="skill-list">
                    <!-- Skills will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = `http://${window.location.hostname || 'localhost'}:8081/api/v1/data`;
        let statsData = null;

        async function init() {
            try {
                const resp = await fetch(`${API_BASE}/skills/stats`);
                statsData = await resp.json();
                renderStats();
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
            } catch (e) {
                console.error(e);
                alert('数据加载失败，请检查后端服务是否启动');
            }
        }

        function renderStats() {
            document.getElementById('totalSkills').innerText = statsData.totalSkills;
            document.getElementById('taggedSkills').innerText = statsData.taggedSkills;
            document.getElementById('totalTags').innerText = statsData.tagDistribution.length;
            
            const coverage = ((statsData.taggedSkills / statsData.totalSkills) * 100).toFixed(1);
            document.getElementById('coverage').innerText = coverage + '%';

            const tagList = document.getElementById('tagList');
            statsData.tagDistribution.forEach(tag => {
                const div = document.createElement('div');
                div.className = 'tag-item';
                div.onclick = () => loadSkillsByTag(tag.name);
                div.innerHTML = `
                    <span class="tag-name">${tag.name}</span>
                    <span class="tag-count">${tag.count}</span>
                `;
                tagList.appendChild(div);
            });
            
            // Auto load first tag
            if (statsData.tagDistribution.length > 0) {
                loadSkillsByTag(statsData.tagDistribution[0].name);
            }
        }

        async function loadSkillsByTag(tagName) {
            // Update UI active state
            document.querySelectorAll('.tag-item').forEach(el => {
                el.classList.toggle('active', el.querySelector('.tag-name').innerText === tagName);
            });
            
            document.getElementById('detailTitle').innerText = `[${tagName}] 关联技能清单`;
            const container = document.getElementById('skillList');
            container.innerHTML = '<div style="color: #64748b;">检索中...</div>';

            try {
                // 使用关键词搜索并增加单页显示上限
                const resp = await fetch(`${API_BASE}/skills/list?keyword=${encodeURIComponent(tagName)}&size=1000`);
                const data = await resp.json();
                
                // 筛选真正包含该标签的技能 (精准过滤)
                const filtered = data.skills.filter(s => {
                    if (!s.aiTags) return false;
                    const tags = s.aiTags.split(/[,，]/).map(t => t.trim());
                    return tags.includes(tagName);
                });

                container.innerHTML = '';
                filtered.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'skill-card-tiny';
                    div.innerHTML = `
                        <h4>${s.name}</h4>
                        <p>${s.desc}</p>
                    `;
                    container.appendChild(div);
                });
                
                if (filtered.length === 0) {
                    container.innerHTML = '<div style="color: #64748b;">未找到匹配技能</div>';
                }
            } catch (e) {
                container.innerHTML = '<div style="color: #ef4444;">详情加载失败</div>';
            }
        }

        async function checkSyncStatus() {
            try {
                const resp = await fetch(`${API_BASE}/skills/ai-sync-status`);
                const data = await resp.json();
                
                const panel = document.getElementById('progressPanel');
                const bar = document.getElementById('progressBar');
                const text = document.getElementById('progressText');
                const btn = document.getElementById('aiSyncBtn');

                if (data.running) {
                    panel.style.display = 'block';
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
                    
                    bar.style.width = `${data.percent}%`;
                    text.innerText = `${data.processed} / ${data.total} (${data.percent.toFixed(1)}%)`;
                    
                    if (!statusInterval) {
                        statusInterval = setInterval(checkSyncStatus, 2000);
                    }
                } else {
                    if (statusInterval) {
                        clearInterval(statusInterval);
                        statusInterval = null;
                        panel.style.display = 'none';
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-bolt"></i> 一键 AI 极速打标';
                        // 任务结束，刷新数据
                        const statsResp = await fetch(`${API_BASE}/skills/stats`);
                        statsData = await statsResp.json();
                        renderStats();
                    }
                }
            } catch (e) {
                console.error('状态轮询失败', e);
            }
        }

        async function triggerAiSync() {
            if (!confirm("确定要启动【并行极速打标】吗？这会根据 GPT-5.4 语义重新修正全库 1300+ 技能的 [攻/防/态] 分类。")) return;
            
            try {
                const resp = await fetch(`${API_BASE}/skills/ai-sync-batch`, { method: 'POST' });
                const data = await resp.json();
                if (data.success) {
                    checkSyncStatus();
                } else {
                    alert(data.message);
                }
            } catch (e) {
                alert('启动失败: ' + e.message);
            }
        }

        document.getElementById('aiSyncBtn').onclick = triggerAiSync;

        init();
    </script>
</body>
</html>
