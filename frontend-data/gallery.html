<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCO 战术全景图鉴</title>
    <link rel="stylesheet" href="encyclopedia.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            padding: 40px;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .filter-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            width: 300px;
            font-size: 14px;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-chip:hover, .tag-chip.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 24px;
            transition: all 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-id {
            font-size: 10px;
            color: #64748b;
            letter-spacing: 1px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
            font-family: 'Outfit';
        }

        .card-desc {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .edit-link {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #64748b;
            font-size: 16px;
            opacity: 0;
            transition: all 0.2s;
        }

        .skill-card:hover .edit-link {
            opacity: 1;
        }

        .edit-link:hover {
            color: #3b82f6;
            transform: scale(1.2);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            align-items: center;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-nav:hover:not(:disabled) {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .nav-link {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <div class="header">
            <div>
                <h1 style="font-family: 'Outfit'; font-size: 32px; margin:0;">战术全景图鉴</h1>
                <p style="color: #64748b; margin: 4px 0 0 0;">Skill Tactical Gallery & Explorer</p>
            </div>
            <div class="nav-links">
                <a href="tagger.html" class="nav-link"><i class="fas fa-edit"></i> 技能打标台</a>
                <a href="stats.html" class="nav-link"><i class="fas fa-chart-pie"></i> 统计大盘</a>
            </div>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索技能名称或描述...">
            <div style="flex: 1;">
                <div style="font-size: 12px; color: #64748b; margin-bottom: 8px;">按热门标签快速搜索:</div>
                <div id="quickTags" class="tag-cloud">
                    <!-- Dynamic Common Tags -->
                </div>
            </div>
        </div>

        <div id="galleryGrid" class="gallery-grid">
            <!-- Dynamic Cards -->
        </div>

        <div class="pagination">
            <button id="prevBtn" class="btn-nav">上一页</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextBtn" class="btn-nav">下一页</button>
        </div>
    </div>

    <script>
        const API_BASE = `http://${window.location.hostname || 'localhost'}:8081/api/v1/data`;
        let currentPage = 1;
        let selectedTag = null;
        const PAGE_SIZE = 48;

        async function init() {
            await loadCommonTags();
            await loadGallery();
        }

        async function loadCommonTags() {
            try {
                const resp = await fetch(`${API_BASE}/skills/stats`);
                const data = await resp.json();
                const container = document.getElementById('quickTags');
                // 取前 15 个热门标签
                data.tagDistribution.slice(0, 15).forEach(tag => {
                    const chip = document.createElement('div');
                    chip.className = 'tag-chip';
                    chip.innerText = tag.name;
                    chip.onclick = () => toggleTagFilter(tag.name);
                    container.appendChild(chip);
                });
            } catch (e) {
                console.error('Failed to load tags for filter bar');
            }
        }

        function toggleTagFilter(tagName) {
            if (selectedTag === tagName) {
                selectedTag = null;
            } else {
                selectedTag = tagName;
            }
            
            document.querySelectorAll('.tag-chip').forEach(el => {
                el.classList.toggle('active', el.innerText === selectedTag);
            });
            
            currentPage = 1;
            loadGallery();
        }

        async function loadGallery() {
            const keyword = document.getElementById('searchInput').value;
            const searchVal = selectedTag ? selectedTag : keyword;
            
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #64748b;">检索中...</div>';

            try {
                const url = `${API_BASE}/skills/list?page=${currentPage}&size=${PAGE_SIZE}&keyword=${encodeURIComponent(searchVal)}`;
                const resp = await fetch(url);
                const data = await resp.json();
                
                renderCards(data.skills);
                document.getElementById('pageInfo').innerText = `Page ${currentPage}`;
                document.getElementById('prevBtn').disabled = currentPage <= 1;
                document.getElementById('nextBtn').disabled = data.skills.length < PAGE_SIZE;
            } catch (e) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #ef4444;">加载失败，请检查服务</div>';
            }
        }

        function renderCards(skills) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            if (skills.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #64748b;">未找到匹配技能</div>';
                return;
            }

            skills.forEach(s => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                
                const tagsHtml = (s.aiTags || "").split(/[,，]/)
                    .filter(t => t.trim())
                    .map(t => `<span class="badge">${t.trim()}</span>`)
                    .join('');

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-id">#${s.id}</span>
                    </div>
                    <div class="card-title">${s.name}</div>
                    <div class="card-desc">${s.desc}</div>
                    <div class="card-tags">${tagsHtml}</div>
                    <a href="tagger.html?id=${s.id}" class="edit-link" title="前往打标台编辑">
                        <i class="fas fa-external-link-alt"></i>
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        // Search events
        document.getElementById('searchInput').oninput = debounce(() => {
            currentPage = 1;
            selectedTag = null;
            document.querySelectorAll('.tag-chip').forEach(el => el.classList.remove('active'));
            loadGallery();
        }, 500);

        document.getElementById('prevBtn').onclick = () => { if (currentPage > 1) { currentPage--; loadGallery(); window.scrollTo(0,0); } };
        document.getElementById('nextBtn').onclick = () => { currentPage++; loadGallery(); window.scrollTo(0,0); };

        function debounce(fn, wait) {
            let t;
            return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), wait); };
        }

        init();
    </script>
</body>
</html>
