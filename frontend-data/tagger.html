<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCO 技能全息打标台 2.0</title>
    <link rel="stylesheet" href="encyclopedia.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .tagger-container {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            height: 100vh;
            gap: 0;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        .panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .panel-header h3 {
            color: #ffffff !important;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            width: 100%;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.1);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* Skill Item Styling */
        .skill-item {
            padding: 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            color: #ffffff;
        }

        .skill-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .skill-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .skill-item h4 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }

        .skill-item .skill-desc-meta {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }

        .status-dot.tagged {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        /* Detail Area */
        .detail-panel {
            background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.1), transparent);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            text-align: center;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 700px;
        }

        .desc-text {
            font-size: 20px;
            line-height: 1.6;
            color: #94a3b8;
            margin-top: 24px;
        }

        /* Tags Controls */
        .tags-panel {
            border-right: none;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tag-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .tag-row {
            display: flex;
            position: relative;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-align: center;
        }

        .tag-row .del-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tag-row:hover .del-btn {
            opacity: 1;
        }

        .tag-row input {
            cursor: pointer;
        }

        .tag-row span {
            font-size: 13px;
            word-break: break-all;
        }

        .tag-row:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .tag-row input {
            width: 18px;
            height: 18px;
        }

        .add-tag-input {
            margin-top: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 100%;
            font-size: 13px;
        }

        .add-tag-input:focus {
            outline: none;
            border-color: #3b82f6;
            border-style: solid;
        }

        .btn-save {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s;
        }

        .btn-save:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-save:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-save.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .pagination {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: #64748b;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .nav-link-btn {
            color: #64748b;
            font-size: 18px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link-btn:hover {
            color: #3b82f6;
            transform: rotate(15deg);
        }

        .ai-panel {
            display: none;
        }

        .btn-ai {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .btn-ai:hover:not(:disabled) {
            background: #7c3aed;
            transform: scale(1.02);
        }

        .btn-ai:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Active Tags Display */
        .tags-badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tag-badge {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            animation: fadeInScale 0.3s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="tagger-container">
        <!-- 1. Left: List -->
        <aside class="panel">
            <div class="panel-header">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                    <h3 style="margin:0; font-size: 18px;">技能全息打标台</h3>
                    <a href="stats.html" class="nav-link-btn" title="查看统计大盘">
                        <i class="fas fa-chart-pie"></i>
                    </a>
                </div>
                <input type="text" id="searchInput" class="search-box" placeholder="搜索技能名称...">
            </div>
            <div id="skillScroll" class="scroll-area"></div>
            <div class="pagination">
                <button id="prevBtn" class="nav-btn">Prev</button>
                <span id="pageInfo">Page 1</span>
                <button id="nextBtn" class="nav-btn">Next</button>
            </div>
        </aside>

        <!-- 2. Middle: Detail -->
        <main class="detail-panel">
            <div id="emptyView" style="opacity: 0.3; text-align: center;">
                <i class="fas fa-hand-pointer fa-3x" style="margin-bottom: 20px;"></i>
                <p>选择技能开始标注</p>
            </div>
            <div id="skillDetail" style="display: none;" class="skill-card">
                <h1 id="skillName" style="font-family: 'Outfit'; font-size: 40px; margin: 0;">--</h1>
                <p id="skillId" style="opacity: 0.4; font-size: 14px;">ID: 000000</p>
                <div id="skillDesc" class="desc-text">--</div>
                <div id="activeTagsDisplay" class="tags-badge-container">
                    <!-- Dynamic Badges -->
                </div>
            </div>
        </main>

        <!-- 3. Right: Tags -->
        <aside class="panel tags-panel">
            <div class="panel-header">
                <h3 style="margin:0; font-size: 16px;">战术标签库</h3>
            </div>
            <div class="scroll-area">
                <div id="tagList" class="tag-list">
                    <!-- Dynamic -->
                </div>
                <input type="text" id="newTagInput" class="add-tag-input" placeholder="+ 输入新标签，回车添加">
                
                <button id="aiSuggestBtn" class="btn-ai" disabled>
                    <i class="fas fa-wand-magic-sparkles"></i> AI 智能推荐 (GPT-4.5)
                </button>

                <button id="saveNextBtn" class="btn-save" style="background: #10b981; margin-bottom: 12px;" disabled>
                    <i class="fas fa-forward"></i> 保存并进入下一条
                </button>

                <button id="saveBtn" class="btn-save" style="margin-top: 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);" disabled>
                    <i class="fas fa-check-circle"></i> 仅保存当前
                </button>
                
                <div id="aiAnalysis" class="ai-panel"></div>

                <div id="statusMsg" style="margin-top: 12px; text-align: center; font-size: 12px;"></div>
            </div>
        </aside>
    </div>

    <script>
        const API_BASE = `http://${window.location.hostname || 'localhost'}:8081/api/v1/data`;
        let currentPage = 1;
        let selectedSkill = null;
        let tagLibrary = [];
        let currentSkills = []; // For sequential navigation

        async function init() {
            await loadLibrary();
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            
            if (targetId) {
                // 如果 URL 带有 id 参数，尝试直接加载该技能
                const resp = await fetch(`${API_BASE}/skills/list?keyword=${targetId}`);
                const data = await resp.json();
                const matched = data.skills.find(s => s.id == targetId);
                if (matched) {
                    await loadSkills();
                    selectSkill(matched);
                    return;
                }
            }
            
            await loadSkills();
        }

        async function loadLibrary() {
            const resp = await fetch(`${API_BASE}/config/tags`);
            const data = await resp.json();
            tagLibrary = data.tags.split(',').filter(t => t.trim().length > 0);
            renderLibrary();
        }

        function renderLibrary() {
            const container = document.getElementById('tagList');
            container.innerHTML = '';
            tagLibrary.forEach(tag => {
                const label = document.createElement('label');
                label.className = 'tag-row';
                label.innerHTML = `
                    <div class="del-btn" title="删除标签"><i class="fas fa-times"></i></div>
                    <input type="checkbox" name="skillTag" value="${tag}">
                    <span>${tag}</span>
                `;
                
                // Click label to toggle checkbox
                label.onclick = (e) => {
                    if (e.target.closest('.del-btn')) {
                        e.preventDefault();
                        deleteTag(tag);
                    }
                };

                container.appendChild(label);
            });
            if (selectedSkill) syncCheckboxes(selectedSkill);
        }

        async function deleteTag(tagName) {
            if (!confirm(`确定要彻底删除标签 [${tagName}] 吗？`)) return;
            
            const newLib = tagLibrary.filter(t => t !== tagName).join(',');
            try {
                const resp = await fetch(`${API_BASE}/config/tags`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({tags: newLib})
                });
                if (resp.ok) {
                    await loadLibrary();
                    showStatus('标签已删除', '#ef4444');
                }
            } catch (e) {
                showStatus('删除失败', '#ef4444');
            }
        }

        async function loadSkills(autoSelectFirst = false) {
            const keyword = document.getElementById('searchInput').value;
            const resp = await fetch(`${API_BASE}/skills/list?page=${currentPage}&keyword=${encodeURIComponent(keyword)}`);
            const data = await resp.json();
            currentSkills = data.skills;
            renderSkills(currentSkills);
            document.getElementById('pageInfo').innerText = `Page ${currentPage}`;
            
            if (autoSelectFirst && currentSkills.length > 0) {
                selectSkill(currentSkills[0]);
            }
        }

        function renderSkills(skills) {
            const container = document.getElementById('skillScroll');
            container.innerHTML = '';
            skills.forEach(s => {
                const div = document.createElement('div');
                div.id = `skill-item-${s.id}`;
                div.className = `skill-item ${selectedSkill?.id === s.id ? 'active' : ''}`;
                div.innerHTML = `
                    <h4>${s.name} <span class="status-dot ${s.aiTags ? 'tagged' : ''}"></span></h4>
                    <div class="skill-desc-meta">${s.desc}</div>
                `;
                div.onclick = () => selectSkill(s);
                container.appendChild(div);
            });
        }

        function selectSkill(skill) {
            selectedSkill = skill;
            document.getElementById('emptyView').style.display = 'none';
            document.getElementById('skillDetail').style.display = 'block';
            document.getElementById('skillName').innerText = skill.name;
            document.getElementById('skillId').innerText = `ID: ${skill.id}`;
            document.getElementById('skillDesc').innerText = skill.desc;
            
            document.querySelectorAll('.skill-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`skill-item-${skill.id}`);
            if (activeEl) activeEl.classList.add('active');

            document.getElementById('saveBtn').disabled = false;
            document.getElementById('saveNextBtn').disabled = false;
            document.getElementById('aiSuggestBtn').disabled = false;
            document.getElementById('aiAnalysis').style.display = 'none';

            syncCheckboxes(skill);
            renderTagBadges(skill.aiTags);
        }

        async function handleAiSuggest() {
            if (!selectedSkill) return;
            const btn = document.getElementById('aiSuggestBtn');
            const originalHtml = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AI 思考中...';
            
            try {
                const resp = await fetch(`${API_BASE}/skills/${selectedSkill.id}/ai-suggest`, {
                    method: 'POST'
                });
                const data = await resp.json();
                
                if (data.success && data.analysis) {
                    const combined = data.combinedTags || "";
                    const suggestedTags = combined.split(/[,，]/).map(t => t.trim());
                    
                    // 1. 自动勾选标签
                    document.querySelectorAll('input[name="skillTag"]').forEach(input => {
                        input.checked = suggestedTags.includes(input.value);
                    });
                    
                    showStatus('AI 推荐已应用', '#8b5cf6');
                } else {
                    showStatus('AI 分析由于网络或 API 问题失败', '#ef4444');
                }
            } catch (e) {
                console.error(e);
                showStatus('AI 接口调用异常', '#ef4444');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        }

        function renderTagBadges(tagsStr) {
            const container = document.getElementById('activeTagsDisplay');
            container.innerHTML = '';
            if (!tagsStr) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'flex';
            const tags = tagsStr.split(',').filter(t => t.trim().length > 0);
            tags.forEach(tag => {
                const badge = document.createElement('span');
                badge.className = 'tag-badge';
                badge.innerText = tag;
                container.appendChild(badge);
            });
        }

        function syncCheckboxes(skill) {
            const current = (skill.aiTags || "").split(',').map(t => t.trim());
            document.querySelectorAll('input[name="skillTag"]').forEach(input => {
                input.checked = current.includes(input.value);
            });
        }

        // --- Core UX: Add Tag on Enter ---
        document.getElementById('newTagInput').onkeyup = async (e) => {
            if (e.key === 'Enter') {
                const name = e.target.value.trim();
                if (!name) return;
                
                // 1. Add to Library
                const newLib = [...tagLibrary, name].join(',');
                await fetch(`${API_BASE}/config/tags`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({tags: newLib})
                });
                
                // 2. Refresh UI
                await loadLibrary();
                
                // 3. Auto check for current skill
                const checkbox = document.querySelector(`input[value="${name}"]`);
                if (checkbox) checkbox.checked = true;
                
                e.target.value = '';
                showStatus('库已更新并自动选中', '#10b981');
            }
        };

        async function handleSave(autoNext = false) {
            if (!selectedSkill) return;
            const btn = autoNext ? document.getElementById('saveNextBtn') : document.getElementById('saveBtn');
            const tags = Array.from(document.querySelectorAll('input[name="skillTag"]:checked')).map(i => i.value);
            
            const originalHTML = btn.innerHTML;
            btn.classList.add('loading');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                const resp = await fetch(`${API_BASE}/skills/${selectedSkill.id}/tags`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({tags})
                });
                if (resp.ok) {
                    showStatus('已保存', '#10b981');
                    selectedSkill.aiTags = tags.join(',');
                    renderTagBadges(selectedSkill.aiTags);
                    const activeEl = document.getElementById(`skill-item-${selectedSkill.id}`);
                    if (activeEl) activeEl.querySelector('.status-dot').classList.add('tagged');

                    if (autoNext) selectNext();
                }
            } catch (e) {
                showStatus('保存失败', '#ef4444');
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = originalHTML;
            }
        }

        function selectNext() {
            const index = currentSkills.findIndex(s => s.id === selectedSkill.id);
            if (index !== -1 && index < currentSkills.length - 1) {
                selectSkill(currentSkills[index + 1]);
            } else {
                currentPage++;
                loadSkills(true);
            }
        }

        document.getElementById('saveBtn').onclick = () => handleSave(false);
        document.getElementById('saveNextBtn').onclick = () => handleSave(true);
        document.getElementById('aiSuggestBtn').onclick = handleAiSuggest;

        function showStatus(msg, color) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.style.color = color;
            setTimeout(() => el.innerText = '', 2000);
        }

        // Navigation
        document.getElementById('prevBtn').onclick = () => { if (currentPage > 1) { currentPage--; loadSkills(); } };
        document.getElementById('nextBtn').onclick = () => { currentPage++; loadSkills(); };
        document.getElementById('searchInput').oninput = debounce(() => { currentPage = 1; loadSkills(); }, 500);

        function debounce(fn, wait) {
            let t;
            return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), wait); };
        }

        init();
    </script>
</body>
</html>
