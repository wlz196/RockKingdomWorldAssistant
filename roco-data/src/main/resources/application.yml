spring:
  datasource:
    url: jdbc:sqlite:/root/roco/roco_encyclopedia.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: true

server:
  port: 8081

roco:
  media-path: /root/roco/media/
  frontend-path: /root/roco/frontend-data/

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

ai:
  openai:
    api-key: ${AI_API_KEY:your-api-key-here}
    base-url: https://gpt-agent.cc/v1
    model: gpt-5.4
