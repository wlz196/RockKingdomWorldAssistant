spring:
  datasource:
    url: jdbc:sqlite:/root/roco/roco_encyclopedia.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: true

server:
  port: 8081

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# LangChain4j AI 配置 (支持 DeepSeek 等兼容 OpenAI 格式的模型)
langchain4j:
  open-ai:
    chat-model:
      api-key: ${AI_API_KEY:your-api-key-here}
      base-url: https://gpt-agent.cc/v1
      model-name: claude-sonnet-4-6
      log-requests: true
      log-responses: true
